<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - M-Train</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg bg-verde-agua w-100">
        <div class="container-fluid">
            <a class="navbar-brand px-4" href="#">
                <img src="imagenes/2.png" alt="GymApp" class="img-fluid" width="200" height="200">
            </a>
            <div class="d-flex ms-auto align-items-center">
                <a class="nav-link text-white lead fs-4 me-5" href="sobreNosotros.html">Sobre nosotros</a>
                <a class="nav-link text-white lead fs-4 me-5" href="entrenamientos.html">Entrenamientos</a>
                <a class="nav-link text-white lead fs-4 me-5" href="#" data-bs-toggle="modal" data-bs-target="#contactanosModal">Contáctanos</a>
            </div>
            <form class="d-flex me-auto" style="margin-left: 60px;" role="search">
                <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Buscar">
                <button class="btn btn-dark text-white" type="submit">Buscar</button>
            </form>
        </div>
    </nav>
    
    <!-- Formulario de Registro -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-light rounded-3">
                    <div class="card-header text-center">
                        <h4>Registrarse</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="name" placeholder="Ingresa tu nombre completo" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo" required>
                            </div>
                            <div class="mb-3">
                                <label for="plan" class="form-label">Selecciona tu plan de entrenamiento</label>
                                <select class="form-control" id="plan" required>
                                    <option value="">Elige un plan</option>
                                    <option value="basico">Básico (Rutinas generales)</option>
                                    <option value="intermedio">Intermedio (Plan personalizado)</option>
                                    <option value="avanzado">Avanzado (Entrenamiento con coach)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-verde-agua w-100">Registrarse</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Evita el envío normal del formulario
            
            let selectedPlan = document.getElementById("plan").value;
            
            if (selectedPlan === "basico") {
                window.location.href = "entrenamiento_basico.html";
            } else if (selectedPlan === "intermedio") {
                window.location.href = "entrenamiento_intermedio.html";
            } else if (selectedPlan === "avanzado") {
                window.location.href = "entrenamiento_avanzado.html";
            } else {
                alert("Por favor, selecciona un plan de entrenamiento.");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
